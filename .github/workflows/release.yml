name: Release & Publish

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'  # Only runs when package.json is changed

jobs:
  release:
    name: Tag, Release & Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create tags and GitHub Releases

    steps:
      # 1. Checkout the full history so we can read CHANGELOG.md
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Read the version from package.json
      - name: Get version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # 3. Check if a tag for this version already exists
      #    This prevents re-releasing if an unrelated change is pushed to package.json
      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 4. Extract only the release notes for THIS version from CHANGELOG.md
      - name: Extract release notes from CHANGELOG.md
        if: steps.tag_check.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          # Use awk to grab the block between this version heading and the next
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to a temp file to safely pass multiline strings to next steps
          echo "$NOTES" > /tmp/release_notes.md
          cat /tmp/release_notes.md

      # 5. Setup Node.js with npm registry auth for publishing
      - name: Setup Node.js
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # 6. Install dependencies and run tests
      - name: Run Tests
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          npm ci
          npm test

      # 7. Create the git tag
      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"

      # 8. Create a GitHub Release with the extracted changelog notes
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --notes-file /tmp/release_notes.md

      # 9. Publish to npm
      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
