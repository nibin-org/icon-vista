<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>icon-vista — Beautiful icons, instantly typed</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="description" content="Search across 200,000+ open-source icons. Click any icon to instantly generate a strictly-typed React component in your codebase.">
  <link rel="stylesheet" href="/vendor/pickr/nano.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- ══ HEADER ══════════════════════════════════════════ -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <span class="logo-text">icon-vista</span>
    </div>

    <div class="header-search">
      <input type="text" id="searchInput" placeholder="Loading inspiration…" autocomplete="off" spellcheck="false">
      <svg class="header-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <kbd>⌘K</kbd>
    </div>

    <div class="header-right">
      <a href="https://icon-vista.vercel.app" target="_blank" rel="noreferrer" style="color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 600; margin-right: 0.5rem; transition: color 0.2s;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">Docs ↗</a>
      <span class="header-badge">200K+ Icons</span>
    </div>
  </header>

  <!-- ══ MAIN LAYOUT ═════════════════════════════════════ -->
  <div class="main-layout">
    <aside class="sidebar" id="filterSidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Filters</span>
      </div>
      
      <div class="skeleton-filter-section">
        <div class="skeleton-filter-title"></div>
        <div class="skeleton-filter-item">
          <div class="skeleton-filter-box"></div>
          <div class="skeleton-filter-label" style="width: 40%"></div>
        </div>
        <div class="skeleton-filter-item">
          <div class="skeleton-filter-box"></div>
          <div class="skeleton-filter-label" style="width: 60%"></div>
        </div>
        <div class="skeleton-filter-item">
          <div class="skeleton-filter-box"></div>
          <div class="skeleton-filter-label" style="width: 50%"></div>
        </div>
      </div>

      <div class="skeleton-filter-section">
        <div class="skeleton-filter-title"></div>
        <div class="skeleton-filter-item">
          <div class="skeleton-filter-box"></div>
          <div class="skeleton-filter-label" style="width: 70%"></div>
        </div>
        <div class="skeleton-filter-item">
          <div class="skeleton-filter-box"></div>
          <div class="skeleton-filter-label" style="width: 45%"></div>
        </div>
        <div class="skeleton-filter-item">
          <div class="skeleton-filter-box"></div>
          <div class="skeleton-filter-label" style="width: 65%"></div>
        </div>
        <div class="skeleton-filter-item">
          <div class="skeleton-filter-box"></div>
          <div class="skeleton-filter-label" style="width: 55%"></div>
        </div>
        <div class="skeleton-filter-item">
          <div class="skeleton-filter-box"></div>
          <div class="skeleton-filter-label" style="width: 80%"></div>
        </div>
      </div>
    </aside>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- ══ TOAST ═══════════════════════════════════════════ -->
  <div id="toast">
    <div class="toast-dot"></div>
    <span>Icon saved to codebase!</span>
  </div>

  <!-- ══ MODAL ═══════════════════════════════════════════ -->
  <div class="modal-backdrop" id="customizeModal">
    <div class="modal-content">

      <!-- Identity bar -->
      <div class="modal-identity">
        <div class="modal-identity-thumb" id="modalThumb">
          <img id="modalThumbImg" src="" alt="">
        </div>
        <div class="modal-identity-info">
          <div class="modal-id-name" id="modalIdName">—</div>
          <div class="modal-id-set"  id="modalIdSet">—</div>
        </div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <!-- Left: preview + bg switcher -->
        <div class="modal-preview-wrap">
          <div class="modal-preview" id="modalPreview"></div>
          <div class="bg-switcher-overlay">
            <button class="bg-swatch active" data-bg="dark"    style="background:#08090f;" title="Dark"></button>
            <button class="bg-swatch"        data-bg="light"   style="background:#f8fafc;" title="Light"></button>
            <button class="bg-swatch"        data-bg="blue"    style="background:#6d28d9;" title="Purple"></button>
            <button class="bg-swatch bg-swatch-checker" data-bg="checker" title="Checker"></button>
          </div>
        </div>

        <!-- Right: controls -->
        <div class="modal-controls">

          <!-- Size -->
          <div class="control-group">
            <div class="control-label-row">
              <label>Size</label>
              <div class="size-presets">
                <button class="size-preset" data-size="16">16</button>
                <button class="size-preset active" data-size="24">24</button>
                <button class="size-preset" data-size="32">32</button>
                <button class="size-preset" data-size="48">48</button>
                <button class="size-preset" data-size="64">64</button>
              </div>
              <span class="control-value" id="sizeValue">24px</span>
            </div>
            <input type="range" id="sizeInput" class="size-slider" min="12" max="128" value="24">
          </div>

          <!-- Color -->
          <div class="control-group">
            <div class="color-top-row">
              <label class="color-section-title">Color</label>
              <label class="inherit-toggle">
                <input type="checkbox" id="inheritToggle">
                <span class="toggle-track" aria-hidden="true"></span>
                <span class="inherit-toggle-label">Inherit color from context</span>
              </label>
            </div>

            <div class="color-bottom-row" id="colorPickerArea">
              <div class="color-col">
                <span class="color-recent-label">Picker</span>
                <div class="color-input-pill">
                  <button class="color-chip" id="colorSwatchBtn" title="Pick a color">
                    <div class="color-chip-fill" id="colorSwatchPreview" style="background:#ffffff"></div>
                  </button>
                  <div class="color-pill-divider"></div>
                  <input type="text" class="color-hex-input" id="colorHex" value="#ffffff" maxlength="7" spellcheck="false" placeholder="#ffffff">
                </div>
              </div>

              <div class="color-col" id="recentColorsContainer" style="display:none;">
                <span class="color-recent-label">Recent</span>
                <div class="color-swatches" id="colorSwatches"></div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Live code snippet -->
      <div class="modal-code">
        <div class="modal-code-label">
          <div style="display:flex; gap:0.75rem; align-items:center;">
            <span>Generated Component</span>
            <div style="display:flex; gap:0.4rem;">
              <div class="segmented-control">
                <button class="segment-btn active" data-type="lang" data-val="ts">TS</button>
                <button class="segment-btn" data-type="lang" data-val="js">JS</button>
              </div>
              <div class="segmented-control">
                <button class="segment-btn active" data-type="style" data-val="standard">function()</button>
                <button class="segment-btn" data-type="style" data-val="arrow">() =&gt;</button>
              </div>
            </div>
          </div>
          <button id="copyCodeBtn" style="background:transparent; border:none; color:var(--text-tertiary); cursor:pointer; padding:0.25rem; display:flex; border-radius:6px; transition: color 0.15s, background 0.15s;" title="Copy to clipboard"
            onmouseenter="this.style.color='white'; this.style.background='rgba(255,255,255,0.08)'"
            onmouseleave="this.style.color=''; this.style.background=''">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        <code id="codeSnippet"></code>
      </div>

      <!-- Footer -->
      <div class="modal-footer" style="justify-content: space-between;">
        <div style="display:flex; gap:0.5rem;">
          <button class="btn-cancel" id="downloadSvgBtn" style="display:flex; align-items:center; gap:0.5rem;" title="Download raw .svg file">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            SVG
          </button>
          <button class="btn-cancel" id="copySvgBtn" style="display:flex; align-items:center; justify-content:center; padding:0.6rem; gap:0.4rem;" title="Copy raw SVG code">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy SVG
          </button>
        </div>
        <div style="display:flex; gap:0.65rem;">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" id="saveComponentBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Add to Project
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="/vendor/pickr/pickr.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
